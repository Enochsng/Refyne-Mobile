# VPS / GitHub Actions deploy — pull pre-built image from GHCR (no build on server).
#
# On the VPS, put this file next to .env. GitHub workflow exports BACKEND_IMAGE when it runs;
# for manual pull: export BACKEND_IMAGE=ghcr.io/<lowercase-owner>/refyne-backend:latest
#
#   docker compose pull && docker compose up -d
#
# HTTPS (easiest on RackNerd): install Caddy on the host → reverse_proxy 127.0.0.1:3001
# (Caddyfile.example). API is bound to loopback only so it is not open on the public internet.
# Quick test without Caddy: change ports to "3001:3001" temporarily.

services:
  api:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .env e.g. ghcr.io/youruser/refyne-backend:latest}
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
